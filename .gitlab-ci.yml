stages:
  - sast
  - build
  - test
  - security
  - deploy

variables:
  CI_REGISTRY: gitlab.home.com:5005
  CI_REGISTRY_IMAGE: ${CI_REGISTRY}/diploma/devsecops
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  DOCKER_BUILDKIT: 1
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

  SONAR_HOST_URL: "http://192.168.0.210:9000" 
  SONAR_PROJECT_KEY: "devsecops"
  SONAR_PROJECT_NAME: "DevSecOps"
  KUBECONFIG: "${CI_PROJECT_DIR}/.kube/config"

  VAULT_ADDR: "https://vault.home.com:8200"
  VAULT_AUTH_ROLE: "gitlab-role"


cache:
  paths:
    - .cache/pip
    - venv/

.kube-setup: &kube-setup
  before_script:
    - apk add --no-cache kubectl curl
    - mkdir -p .kube
    - echo "$K8S_KUBECONFIG_BASE64" | base64 -d > .kube/config
    - chmod 600 .kube/config
    - kubectl get nodes

# STAGE: SAST
lint:
  stage: sast
  image: python:3.12-slim
  allow_failure: true
  before_script:
    - pip install ruff black mypy
  script:
    - ruff check app/
    - black --check app/
    - mypy app/ --ignore-missing-imports
  only:
    - master
    - dev

sonarqube-sast:
  stage: sast
  image: sonarsource/sonar-scanner-cli:latest
  allow_failure: false
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  script:
    - sonar-scanner
      -Dsonar.host.url=${SONAR_HOST_URL}
      -Dsonar.token=${SONAR_TOKEN}
      -Dsonar.projectKey=${SONAR_PROJECT_KEY}
      -Dsonar.projectName=${SONAR_PROJECT_NAME}
      -Dsonar.projectVersion=${CI_COMMIT_SHORT_SHA}
      -Dsonar.sources=.
      -Dsonar.exclusions=**/tests/**,**/venv/**,**/__pycache__/**,**/*.pyc
      -Dsonar.python.coverage.reportPaths=coverage.xml
      -Dsonar.python.pylint.reportPaths=pylint-report.txt
  artifacts:
    when: always
    paths:
      - .scannerwork/
      - .sonar/report-task.txt

mail-sast:
  stage: sast
  image: python:3.12-slim
  needs:
    - job: lint
      artifacts: true
    - job: sonarqube-sast
      artifacts: true
  before_script:
    - pip install requests python-gitlab
  script:
    - |
      echo "SAST Stage Report" > stage_report.txt
      echo "==================" >> stage_report.txt
      echo "Pipeline: ${CI_PIPELINE_URL}" >> stage_report.txt
      echo "Branch: ${CI_COMMIT_BRANCH}" >> stage_report.txt
      echo "Commit: ${CI_COMMIT_SHORT_SHA}" >> stage_report.txt
      echo "" >> stage_report.txt
      
      echo "Available files:" >> stage_report.txt
      ls -la >> stage_report.txt
      
      if [ -f .sonar/report-task.txt ]; then
        echo "SonarQube report found" >> stage_report.txt
        cp .sonar/report-task.txt sonar-report.txt
      fi
      
      # Создаём архив
      tar -czf security_reports.tar.gz stage_report.txt sonar-report.txt 2>/dev/null || true
      
      if [ ! -f security_reports.tar.gz ] || [ $(stat -c%s "security_reports.tar.gz") -lt 50 ]; then
        echo "No SAST reports available" > no_reports.txt
        tar -czf security_reports.tar.gz no_reports.txt
      fi
    - python send_report.py
  artifacts:
    when: always
    paths:
      - security_reports.tar.gz
    expire_in: 2 weeks
  only:
    - master
    - dev
  allow_failure: true

# STAGE: Build
build:
  stage: build
  image: docker:24.0.5
  services:
    - name: docker:24.0.5-dind
      command:
        - --insecure-registry=gitlab.home.com:5005
        - --tls=false
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD http://gitlab.home.com:5005
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA -f ./Dockerfile .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - master
    - dev

container-scanning-trivy:
  stage: build
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  allow_failure: false
  script:
    - trivy image --insecure --severity HIGH,CRITICAL --exit-code 0 $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - trivy image --insecure --format json --output gl-container-scanning-report.json $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  artifacts:
    when: always
    paths:
      - gl-container-scanning-report.json
  only:
    - master
    - dev

mail-build:
  stage: build
  image: python:3.12-slim
  needs:
    - job: build
      artifacts: true
    - job: container-scanning-trivy
      artifacts: true
  before_script:
    - pip install requests python-gitlab
  script:
    - |
      echo "Build & Container Scan Report" > stage_report.txt
      echo "=============================" >> stage_report.txt
      echo "Pipeline: ${CI_PIPELINE_URL}" >> stage_report.txt
      echo "Branch: ${CI_COMMIT_BRANCH}" >> stage_report.txt
      echo "Commit: ${CI_COMMIT_SHORT_SHA}" >> stage_report.txt
      echo "Docker Image: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}" >> stage_report.txt
      echo "" >> stage_report.txt
      
      if [ -f gl-container-scanning-report.json ]; then
        echo "Container scan JSON report found" >> stage_report.txt
      else
        echo "No container scan report found" >> stage_report.txt
      fi
      
      if [ -f gl-container-scanning-report.json ]; then
        tar -czf security_reports.tar.gz gl-container-scanning-report.json stage_report.txt
      else
        echo "No build reports available" > no_reports.txt
        tar -czf security_reports.tar.gz no_reports.txt
      fi
    - python send_report.py
  artifacts:
    when: always
    paths:
      - security_reports.tar.gz
    expire_in: 2 weeks
  only:
    - master
    - dev
  allow_failure: true
      
# STAGE: Test
test:
  stage: test
  image: python:3.12-slim
  allow_failure: false
  before_script:
    - pip install -r requirements.txt
  script:
    - export PYTHONPATH="${PYTHONPATH}:$(pwd)"
    - pytest tests/ --cov=app --cov-report=term --cov-fail-under=0 -v
  artifacts:
    when: always
    paths:
      - coverage.xml
  only:
    - master
    - dev

mail-test:
  stage: test
  image: python:3.12-slim
  needs:
    - job: test
      artifacts: true
  before_script:
    - pip install requests python-gitlab
  script:
    - |
      echo "Test Stage Report" > stage_report.txt
      echo "=================" >> stage_report.txt
      echo "Pipeline: ${CI_PIPELINE_URL}" >> stage_report.txt
      echo "Branch: ${CI_COMMIT_BRANCH}" >> stage_report.txt
      echo "Commit: ${CI_COMMIT_SHORT_SHA}" >> stage_report.txt
      echo "" >> stage_report.txt
      
      if [ -f coverage.xml ]; then
        echo "Coverage report found" >> stage_report.txt
        grep -o 'line-rate="[0-9.]*"' coverage.xml | head -1 >> stage_report.txt
        tar -czf security_reports.tar.gz coverage.xml stage_report.txt
      else
        echo "No test reports available" > no_reports.txt
        tar -czf security_reports.tar.gz no_reports.txt
      fi
    - python send_report.py
  artifacts:
    when: always
    paths:
      - security_reports.tar.gz
    expire_in: 2 weeks
  only:
    - master
    - dev
  allow_failure: true

# STAGE: Security
secret-detection:
  stage: security
  image: alpine:latest
  allow_failure: false
  before_script:
    - apk add --no-cache git curl
    - curl -L -o gitleaks https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz
    - tar -xzf gitleaks || true
    - chmod +x gitleaks
  script:
    - ./gitleaks detect --source=. --verbose --redact
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
  only:
    - master
    - dev

dependency-scanning:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  allow_failure: false
  script:
    - trivy fs --security-checks vuln --severity HIGH,CRITICAL --exit-code 1 .
    - trivy fs --format json --output gl-dependency-scanning-report.json .
  artifacts:
    when: always
    paths:
      - gl-dependency-scanning-report.json
  only:
    - master
    - dev

iac-scanning:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  allow_failure: false
  script:
    - trivy config --severity HIGH,CRITICAL --exit-code 0 Dockerfile
    - trivy config --severity HIGH,CRITICAL --exit-code 0 docker-compose.yml
    - trivy config --format json --output gl-iac-scanning-report.json Dockerfile
  artifacts:
    when: always
    paths:
      - gl-iac-scanning-report.json
  only:
    - master
    - dev

sbom-generation:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  allow_failure: false
  script:
    - trivy image --format cyclonedx --output gl-sbom.cdx.json $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  artifacts:
    when: always
    paths:
      - gl-sbom.cdx.json
    expire_in: 1 week
  only:
    - master
    - dev

mail-security:
  stage: security
  image: python:3.12-slim
  needs:
    - job: secret-detection
      artifacts: true
      optional: true
    - job: dependency-scanning
      artifacts: true
      optional: true 
    - job: iac-scanning
      artifacts: true
      optional: true
    - job: sbom-generation
      artifacts: true
      optional: true   
  before_script:
    - pip install requests python-gitlab
  script:
    - |
      echo "Security Stage Report" > stage_report.txt
      echo "=====================" >> stage_report.txt
      echo "Pipeline: ${CI_PIPELINE_URL}" >> stage_report.txt
      echo "Branch: ${CI_COMMIT_BRANCH}" >> stage_report.txt
      echo "Commit: ${CI_COMMIT_SHORT_SHA}" >> stage_report.txt
      echo "" >> stage_report.txt
      
      echo "Generated Reports:" >> stage_report.txt
      ls -la gl-*.json 2>/dev/null >> stage_report.txt || echo "No JSON reports" >> stage_report.txt
      ls -la *-report.txt 2>/dev/null >> stage_report.txt || echo "No text reports" >> stage_report.txt
      
      tar -czf security_reports.tar.gz gl-*.json *-report.txt stage_report.txt 2>/dev/null || true
      
      if [ ! -f security_reports.tar.gz ]; then
        echo "No security reports available" > no_reports.txt
        tar -czf security_reports.tar.gz no_reports.txt
      fi
    - python send_report.py
  artifacts:
    when: always
    paths:
      - security_reports.tar.gz
    expire_in: 2 weeks
  only:
    - master
    - dev
  allow_failure: true
  when: always

# STAGE: Deploy
deploy:
  stage: deploy
  image: 
    name: alpine/helm:3.16
    entrypoint: [""]
  before_script:
    - apk add --no-cache kubectl curl
    
    - mkdir -p .kube
    - echo "${K8S_KUBECONFIG_BASE64}" | base64 -d > .kube/config
    - chmod 600 .kube/config
    
    - kubectl get nodes
    
    - kubectl create namespace ${K8S_NAMESPACE:-default} --dry-run=client -o yaml | kubectl apply -f -
    
    - |
      kubectl delete secret regcred --namespace ${K8S_NAMESPACE:-default} --ignore-not-found=true
      kubectl create secret docker-registry regcred \
        --namespace ${K8S_NAMESPACE:-default} \
        --docker-server="${CI_REGISTRY}" \
        --docker-username="${CI_REGISTRY_USER}" \
        --docker-password="${CI_REGISTRY_PASSWORD}" \
        --docker-email="${GITLAB_USER_EMAIL}" \
        --dry-run=client -o yaml | kubectl apply -f -
    - |
      kubectl create secret generic app-secrets --namespace ${K8S_NAMESPACE:-default} \
        --from-literal=DATABASE_URL="${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/app_db}" \
        --from-literal=SECRET_KEY="${SECRET_KEY:-change-this-in-production}" \
        --dry-run=client -o yaml | kubectl apply -f -
  script:
    - |
      helm upgrade --install fastapi-app ./helm/ \
        --namespace ${K8S_NAMESPACE:-default} \
        --create-namespace \
        --set image.repository=${CI_REGISTRY_IMAGE} \
        --set image.tag=${CI_COMMIT_SHORT_SHA} \
        --set image.pullPolicy=Always \
        --set secrets.DATABASE_URL="${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/app_db}" \
        --set secrets.SECRET_KEY="${SECRET_KEY:-change-this-in-production}" \
        --set config.ENABLE_METRICS=true \
        --wait \
        --timeout 5m \
        --debug
    - |
      if kubectl get ingress fastapi-app -n ${K8S_NAMESPACE:-default} 2>/dev/null; then
        INGRESS_HOST=$(kubectl get ingress fastapi-app -n ${K8S_NAMESPACE:-default} -o jsonpath='{.spec.rules[0].host}')
        echo "DAST_TARGET_URL=http://${INGRESS_HOST}" >> dast.env
        echo "Application available at: http://${INGRESS_HOST}"
      else
        kubectl port-forward svc/fastapi-app 8000:8000 -n ${K8S_NAMESPACE:-default} &
        echo "DAST_TARGET_URL=http://localhost:8000" >> dast.env
        echo "Application available at: http://localhost:8000 (port-forwarded)"
      fi
    
    # Проверяем статус деплоя
    - helm status fastapi-app -n ${K8S_NAMESPACE:-default}
    - kubectl get pods -n ${K8S_NAMESPACE:-default}
    - kubectl get svc -n ${K8S_NAMESPACE:-default}
  after_script:
    - |
      if [ $CI_JOB_STATUS != "success" ]; then
        echo "=== Deployment failed, fetching logs ==="
        kubectl logs -n ${K8S_NAMESPACE:-default} -l app.kubernetes.io/instance=fastapi-app --tail=100 || true
      fi
  artifacts:
    when: always
    paths:
      - dast.env
    reports:
      dotenv: dast.env
    expire_in: 1 week
  environment:
    name: dev
    url: http://app.home.com
  only:
    - master
    - dev
  when: manual
  allow_failure: false

dast:
  stage: deploy
  image: owasp/zap2docker-stable
  needs:
    - deploy
  script:
    - mkdir -p /zap/wrk
    - zap-baseline.py -t ${DAST_TARGET_URL:-http://localhost:8000} -r /zap/wrk/zap_report.html -J /zap/wrk/zap_report.json -I
    - cp /zap/wrk/zap_report.html .
    - cp /zap/wrk/zap_report.json .
  artifacts:
    paths:
      - zap_report.html
      - zap_report.json
    expire_in: 1 week
  allow_failure: false
  only:
    - master
    - dev

dast-mail:
  stage: deploy
  image: python:3.12-slim
  needs:
    - dast
  before_script:
    - pip install requests python-gitlab
  script:
    - |
      echo "DAST Security Scan Report" > dast_report.txt
      echo "========================" >> dast_report.txt
      echo "Pipeline: ${CI_PIPELINE_URL}" >> dast_report.txt
      echo "Branch: ${CI_COMMIT_BRANCH}" >> dast_report.txt
      echo "Commit: ${CI_COMMIT_SHORT_SHA}" >> dast_report.txt
      echo "Target URL: ${DAST_TARGET_URL:-http://localhost:8000}" >> dast_report.txt
      echo "" >> dast_report.txt
      
      if [ -f zap_report.json ]; then
        HIGH=$(grep -o '"risk":"High"' zap_report.json 2>/dev/null | wc -l)
        MEDIUM=$(grep -o '"risk":"Medium"' zap_report.json 2>/dev/null | wc -l)
        echo "HIGH: $HIGH, MEDIUM: $MEDIUM" >> dast_report.txt
      fi
      
      tar -czf dast_reports.tar.gz zap_report.html zap_report.json dast_report.txt 2>/dev/null || true
      
      if [ ! -f dast_reports.tar.gz ]; then
        echo "No DAST reports available" > no_reports.txt
        tar -czf dast_reports.tar.gz no_reports.txt
      fi
    - python send_report.py
  artifacts:
    when: always
    paths:
      - dast_reports.tar.gz
    expire_in: 2 weeks
  only:
    - master
    - dev
  allow_failure: true
  when: always
